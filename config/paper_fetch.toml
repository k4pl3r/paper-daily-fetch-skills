default_topic = "video-generation"
language = "zh-CN"
image_strategy = "prefer-overview-otherwise-first"
markdown_output_dir = "../examples/output"
cache_dir = "~/.cache/paper-daily-fetch"

[sources]
enabled = ["hf-daily", "hf-trending", "arxiv-api", "arxiv-search"]
timeout = 20
retries = 2
backoff_seconds = 1.0

[discover]
candidate_limit = 50

[enrich]
# Number of parallel workers for enrichment (code URL + figure extraction)
# Higher values = faster but may trigger arXiv rate limiting (429 errors)
max_workers = 10
# Timeout budget in seconds for each paper's enrichment
timeout = 30
# Pre-rank limit: only enrich the top N papers after initial ranking
# This dramatically reduces HTTP requests (e.g., 10 instead of 50)
pre_rank_limit = 10

[rank]
final_limit = 3

[history]
path = "~/.cache/paper-daily-fetch/history/published.json"
lookback_days = 14

[openclaw]
default_target = "paper-daily-chat"

[topics.video-generation]
keywords = ["video generation", "world model", "diffusion transformer"]
negative_keywords = ["benchmark", "survey"]
domain_boost_keywords = ["video", "world model", "transformer"]

[topics.world-model]
keywords = ["world model", "video prediction", "policy world model"]
negative_keywords = ["benchmark", "survey"]
domain_boost_keywords = ["embodied", "policy", "simulation"]

[topics.3dgs-reconstruction]
keywords = ["3dgs reconstruction", "gaussian splatting", "novel view synthesis"]
negative_keywords = ["benchmark", "survey"]
domain_boost_keywords = ["4k", "textured splatting", "pose-free"]
